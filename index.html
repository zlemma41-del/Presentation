<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apical Energy & Resources</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #2F4951;
  --light: #F6F7F7;
  --white: #FFFFFF;
  --text: #24343A;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--text);
}

/* HEADER */
.header {
  background: white;
  padding: 20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo {
  display:flex;
  align-items:center;
  gap:15px;
}

.logo img {
  height:50px;
}

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size:26px;
  color: var(--navy);
  letter-spacing:2px;
}

/* HERO */
.hero {
  padding:80px 40px;
  text-align:center;
  background:white;
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size:40px;
  color: var(--navy);
}

.hero p {
  margin-top:15px;
  color:#666;
  max-width:600px;
  margin-inline:auto;
}

/* SECTION */
.section {
  padding:60px 40px;
  max-width:800px;
  margin:auto;
  text-align:center;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size:28px;
  color: var(--navy);
  margin-bottom:20px;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:10px;
  border:1px solid #ddd;
  max-width:600px;
  margin:auto;
}

.card h3 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--navy);
  margin-bottom:10px;
}

.card p {
  font-size:14px;
  margin-bottom:15px;
}

.embed {
  width:100%;
  height:350px;
  border:none;
  border-radius:8px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  background:white;
  border-top:1px solid #ddd;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="Logo-Apical.png" alt="Apical Logo">
    <div class="logo-text">APICAL</div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Energy. Resources. Opportunity.</h1>
  <p>
    A centralized platform for investors and partners to access Apical presentations and insights.
  </p>
</div>

<!-- PRESENTATION (SINGLE CARD) -->
<div class="section">
  <div class="section-title">Presentation</div>

  <div class="card">
    <h3>Company Overview</h3>
    <p>Main investor presentation.</p>
    <iframe src="https://1drv.ms/p/c/785836418f539ed4/IQT_xipFGPeBSIqDng99003kAc-5IWljwJPurWkTfBXXiag" width="402" height="327" frameborder="0" scrolling="no"></iframe>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Apical Energy & Resources
</div>

</body>
</html>
